; World Cup Tracker — Matrix Portal S3 STANDALONE firmware.
;
; Unlike ../matrixportal-arduino (which fetches pre-rendered frames from the
; Elixir server and blits them), this build does it all on-device: polls ESPN,
; parses the JSON, runs the goal/finished state machine, and renders the three
; World Cup boards natively at ~60fps. No server, no LXC dependency.
;
; Build + flash:  pio run -t upload
; Serial monitor: pio device monitor
; First flash ever (from CircuitPython): double-tap RESET for the bootloader.

[env:matrixportal_s3]
platform = espressif32
board = adafruit_matrixportal_esp32s3
framework = arduino
monitor_speed = 115200
; The Matrix Portal S3 carries 2MB PSRAM + 8MB flash. Enable PSRAM so the
; ArduinoJson parse buffers and large fetch bodies have room; map the larger
; flash so the baked flag art (~85KB) and code fit comfortably.
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv
build_flags =
    ; We bake gamma 2.2 + time-of-day brightness into the frame ourselves (see
    ; Fb::present / Brightness), exactly as the server's Rgb565 encode does; the
    ; library's CIE1931 curve on top would double-correct and crush mids.
    -DNO_CIE1931
    -DBOARD_HAS_PSRAM
lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.12
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit NeoPixel@^1.12.3
    bblanchon/ArduinoJson@^7.1.0
