; TravisTracker — Matrix Portal S3 firmware (Arduino port).
;
; Build + flash:  pio run -t upload
; Serial monitor: pio device monitor
; First flash ever (from CircuitPython): double-tap RESET for the bootloader.

[env:matrixportal_s3]
platform = espressif32
board = adafruit_matrixportal_esp32s3
framework = arduino
monitor_speed = 115200
lib_deps =
    mrfaptastic/ESP32 HUB75 LED MATRIX PANEL DMA Display@^3.0.12
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit NeoPixel@^1.12.3
build_flags =
    ; The server bakes gamma 2.2 + brightness into the frame (Rgb565 encode);
    ; the library's CIE1931 curve on top would double-correct and crush mids.
    -DNO_CIE1931
